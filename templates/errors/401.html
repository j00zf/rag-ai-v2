<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<title>401 Unauthorized</title>

<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
}

body{
background:linear-gradient(135deg,#6b7280,#1f2933);
color:#e5e7eb;
font-family:'Nunito',sans-serif;
min-height:100vh;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
}

h1{
color:#ffffff;
font-size:3.5em;
font-weight:700;
margin-bottom:40px;
text-align:center;
}

.container{
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
text-align:center;
background:#2b2f36;
padding:40px;
border-radius:10px;
box-shadow:0 20px 60px rgba(0,0,0,0.4);
max-width:500px;
}

.col{
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
}

.col img{
margin-top:10px;
width:220px;
border-radius:6px;
}

.col h4{
font-size:1.5em;
font-weight:600;
padding:10px;
color:#ffffff;
}

.col h5{
font-size:1.2em;
font-weight:400;
padding:6px;
color:#cbd5e1;
}

.col p{
font-size:.95em;
margin-top:20px;
}

.col p a{
color:#9ca3af;
text-decoration:none;
font-weight:600;
}

.col p a:hover{
color:#ffffff;
}

</style>

</head>

<body>

<h1>401 Unauthorized</h1>

<div class="container">

<div class="col">
<h4>Oops, something went wrong.</h4>
<h5>Invalid credentials.</h5>

<p>

</p>

<img src="https://media2.giphy.com/media/830H0uF08yM5J29qjf/source.gif">
</div>

</div>

</body>
</html>
