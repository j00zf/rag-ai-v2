<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<title>400 Bad Request</title>

<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">

<style>

body{
height:100vh;
margin:0;
background-image:radial-gradient(closest-side,#6b7280,#1f2933);
text-align:center;
color:#fff;
font-family:'Nunito',sans-serif;
font-size:16px;
line-height:1.5;
}

.logo{
margin:40px auto;
display:block;
}

h1{
font-size:26px;
line-height:40px;
margin:0 auto 16px;
padding:0 20px;
text-shadow:0 2px 4px rgba(0,0,0,0.3);
letter-spacing:.5px;
font-weight:700;
max-width:600px;
}

p{
color:#d1d5db;
font-weight:400;
max-width:600px;
margin:0 auto 24px;
text-shadow:0 2px 3px rgba(0,0,0,0.2);
letter-spacing:.4px;
padding:0 20px;
}

p a{
color:#ffffff;
text-decoration:underline;
}

.browser{
width:400px;
min-width:200px;
min-height:264px;
background:#ffffff;
box-shadow:0 40px 80px rgba(0,0,0,0.35);
border-radius:4px;
animation:bobble 1.8s ease-in-out infinite;
position:relative;
left:50%;
margin-left:-200px;
}

.controls{
width:100%;
height:32px;
background:#e5e7eb;
border-radius:4px 4px 0 0;
box-sizing:border-box;
padding:10px 12px;
}

.controls i{
height:12px;
width:12px;
border-radius:100%;
display:block;
float:left;
background:#9ca3af;
margin-right:8px;
}

.eye{
position:absolute;
left:34%;
top:80px;
width:32px;
height:32px;
}

.eye + .eye{
right:34%;
left:auto;
}

.eye:before,
.eye:after{
position:absolute;
left:15px;
content:'';
height:40px;
width:3px;
border-radius:2px;
background:#ef4444;
}

.eye:before{ transform:rotate(45deg); }
.eye:after{ transform:rotate(-45deg); }

.mouth{
position:absolute;
width:250px;
top:178px;
left:50%;
margin-left:-125px;
height:40px;
}

.lips{
position:absolute;
height:40px;
width:3px;
border-radius:2px;
background:#ef4444;
}

.lips:nth-child(odd){ transform:rotate(54deg); }
.lips:nth-child(even){ transform:rotate(-54deg); }

.lips:nth-child(1){left:0;}
.lips:nth-child(2){left:31px;}
.lips:nth-child(3){left:62px;}
.lips:nth-child(4){left:93px;}
.lips:nth-child(5){left:124px;}
.lips:nth-child(6){left:155px;}
.lips:nth-child(7){left:186px;}
.lips:nth-child(8){left:217px;}

@keyframes bobble{
0%,100%{
margin-top:40px;
margin-bottom:48px;
box-shadow:0 40px 80px rgba(0,0,0,0.35);
}
50%{
margin-top:54px;
margin-bottom:34px;
box-shadow:0 24px 64px rgba(0,0,0,0.45);
}
}

@media screen and (max-width:480px){

.browser{
width:280px;
margin-left:-140px;
}

.eye{ left:30%; }

.eye + .eye{
left:auto;
right:30%;
}

}

</style>

</head>

<body>

<img src="https://s3-us-west-2.amazonaws.com/s.cdpn.io/612187/mc-logo-white.svg" class="logo" width="150">

<div class="browser">

<div class="controls">
<i></i>
<i></i>
<i></i>
</div>

<div class="eye"></div>
<div class="eye"></div>

<div class="mouth">
<div class="lips"></div>
<div class="lips"></div>
<div class="lips"></div>
<div class="lips"></div>
<div class="lips"></div>
<div class="lips"></div>
<div class="lips"></div>
<div class="lips"></div>
</div>

</div>

<h1>400 Bad Request</h1>

<p>

</p>

</body>
</html>
