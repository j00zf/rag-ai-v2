<!DOCTYPE html>

<html lang="en">

<head>
<meta charset="UTF-8">
<title>Page not Found</title>

<link href="https://fonts.googleapis.com/css?family=Nunito+Sans" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>

<style>

:root{
--blue:#0e0620;
--white:#fff;
--green:#2ccf6d;
}

html,body{
height:100%;
margin:0;
}

body{
display:flex;
align-items:center;
justify-content:center;
font-family:"Nunito Sans";
color:var(--blue);
}

svg{
width:100%;
visibility:hidden;
}

h1{
font-size:7em;
margin:10px 0;
font-weight:bold;
}

h2{
font-weight:bold;
}

.container{
max-width:1100px;
padding:20px;
}

.row{
display:flex;
align-items:center;
flex-wrap:wrap;
}

.col{
flex:1;
min-width:300px;
}

.btn{
border:4px solid var(--green);
padding:10px 50px;
border-radius:30px;
font-weight:bold;
cursor:pointer;
background:transparent;
transition:.3s;
}

.btn:hover{
background:var(--green);
color:white;
}

</style>

</head>

<body>

<main>
<div class="container">
<div class="row">

<div class="col">

<svg viewBox="0 0 800 600">
<circle id="planet" cx="572" cy="108" r="90" stroke="#0E0620" fill="none" stroke-width="3"/>
<circle id="craterBig" cx="548" cy="62" r="13" stroke="#0E0620" fill="none" stroke-width="3"/>
<circle id="craterSmall" cx="592" cy="158" r="8" stroke="#0E0620" fill="none" stroke-width="3"/>
</svg>

</div>

<div class="col">

<h1>404</h1>
<h2>UH OH! You're lost.</h2>

<p>
The page you are looking for does not exist.
How you got here is a mystery.
But you can click the button below
to go back to the homepage.
</p>

<button class="btn" onclick="window.location.href='/'">HOME</button>

</div>

</div>
</div>
</main>

<script>

gsap.set("svg",{visibility:"visible"})

gsap.to("#planet",{
rotation:-2,
repeat:-1,
yoyo:true,
duration:1,
transformOrigin:"50% 50%",
ease:"sine.inOut"
})

gsap.to("#craterSmall",{
x:-3,
repeat:-1,
yoyo:true,
duration:1
})

gsap.to("#craterBig",{
x:3,
repeat:-1,
yoyo:true,
duration:1
})

</script>

</body>
</html>
