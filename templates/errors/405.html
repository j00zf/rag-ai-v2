<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<title>405 Method Not Allowed</title>

<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700&display=swap" rel="stylesheet">

<style>

body{
min-height:100vh;
margin:0;
background:#111111;
font-family:'Nunito',sans-serif;
text-transform:uppercase;
overflow:hidden;
}

/* police tape */

.police-tape{
background:#e2bb2d;
background:linear-gradient(180deg,#f2d76a 0%,#e2bb2d 5%,#e2bb2d 90%,#f0d34f 95%,#5c4a0a 100%);
padding:0.125em;
font-size:3em;
text-align:center;
white-space:nowrap;
color:#111;
font-weight:700;
}

.police-tape--1{
transform:rotate(10deg);
position:absolute;
top:40%;
left:-5%;
right:-5%;
z-index:2;
}

.police-tape--2{
transform:rotate(-8deg);
position:absolute;
top:52%;
left:-5%;
right:-5%;
}

/* ghost layout */

.ghost{
display:flex;
flex-direction:column;
height:100vh;
}

.ghost--columns{
display:flex;
flex-grow:1;
flex-basis:200px;
}

.ghost--navbar{
flex:0 0 60px;
background:linear-gradient(0deg,#27292d 0px,#27292d 10px,transparent 10px);
border-bottom:2px solid #111;
}

.ghost--column{
flex:1 0 30%;
border-left:10px solid #27292d;
background:#1f2124;
}

/* code blocks */

.code{
display:block;
width:100px;
background:#27292d;
height:1em;
margin:1em;
}

.ghost--main{
background:#111;
border-top:15px solid #333;
flex:1 0 100px;
}

.ghost--main .code{
height:2em;
width:200px;
}

</style>

</head>

<body>

<div class="ghost">

<div class="ghost--navbar"></div>

<div class="ghost--columns">

<div class="ghost--column">
<div class="code"></div>
<div class="code"></div>
<div class="code"></div>
<div class="code"></div>
</div>

<div class="ghost--column">
<div class="code"></div>
<div class="code"></div>
<div class="code"></div>
<div class="code"></div>
</div>

<div class="ghost--column">
<div class="code"></div>
<div class="code"></div>
<div class="code"></div>
<div class="code"></div>
</div>

</div>

<div class="ghost--main">
<div class="code"></div>
<div class="code"></div>
</div>

</div>

<h1 class="police-tape police-tape--1">
&nbsp;&nbsp;405 METHOD NOT ALLOWED&nbsp;&nbsp;405 METHOD NOT ALLOWED&nbsp;&nbsp;405 METHOD NOT ALLOWED&nbsp;&nbsp;
</h1>

<h1 class="police-tape police-tape--2">
&nbsp;&nbsp;ACCESS DENIED&nbsp;&nbsp;ACCESS DENIED&nbsp;&nbsp;ACCESS DENIED&nbsp;&nbsp;
</h1>

</body>
</html>
