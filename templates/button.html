<!-- Chat Button -->
<button onclick="toggleChatbot()"
  style="
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: #2563eb;
    color: white;
    border: none;
    padding: 14px;
    border-radius: 50%;
    font-size: 18px;
    cursor: pointer;
    z-index: 9999;
  ">
  💬
</button>

<!-- Chat Window -->
<div id="chatbotBox"
  style="
    position: fixed;
    bottom: 80px;
    right: 20px;
    width: 360px;
    height: 600px;
    display: none;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 10px 25px rgba(0,0,0,0.3);
    background: white;
    z-index: 9999;
  ">

  <iframe 
    src="https://airag.duckdns.org/" 
    style="width:100%; height:100%; border:none;">
  </iframe>

</div>

<script>
function toggleChatbot() {
  const box = document.getElementById("chatbotBox");
  box.style.display = box.style.display === "none" ? "block" : "none";
}
</script>
