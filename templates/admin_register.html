<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Registration</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 420px; margin: 60px auto; padding: 20px; }
        .container { border: 1px solid #ddd; padding: 30px; border-radius: 8px; }
        h2 { text-align: center; }
        input { width: 100%; padding: 10px; margin: 10px 0; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #4CAF50; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background: #45a049; }
        .error { color: #d32f2f; margin: 10px 0; }
        .success { color: #2e7d32; margin: 10px 0; }
        .back { text-align: center; margin-top: 20px; }
    </style>
</head>
<body>

<div class="container">
    <h2>Admin Registration</h2>

    {% if error %}
        <div class="error">{{ error }}</div>
    {% endif %}

    {% if success %}
        <div class="success">{{ success }}</div>
    {% endif %}

    <form method="POST" action="">
        <input type="text" name="username" placeholder="Username" required autofocus>
        <input type="password" name="password" placeholder="Password" required>
        <input type="password" name="confirm_password" placeholder="Confirm Password" required>

        {% if registration_key_required %}
        <input type="text" name="secret_key" placeholder="Registration Key" required>
        {% endif %}

        <button type="submit">Register</button>
    </form>

    <div class="back">
        <a href="/admin/login">← Back to Login</a>
    </div>
</div>

</body>
</html>
