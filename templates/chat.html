<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>College AI Chatbot</title>

  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <style>
    :root {
      --bg:          #fdfdf9;
      --surface:     #ffffff;
      --border:      #e2e8f0;
      --text-base:   #1e293b;
      --text-mute:   #64748b;
      --text-light:  #94a3b8;
      --accent:      #3b82f6;
      --accent-dark: #2563eb;
      --user-bg:     #dbeafe;
      --bot-bg:      #ecfdf5;
      --radius:      1rem;
      --shadow-sm:   0 1px 3px rgba(0,0,0,0.04), 0 1px 2px rgba(0,0,0,0.06);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text-base);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    header {
      background: white;
      border-bottom: 1px solid var(--border);
      padding: 1.1rem 1.5rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      box-shadow: var(--shadow-sm);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    header h1 {
      font-size: 1.35rem;
      font-weight: 600;
      letter-spacing: -0.02em;
    }

    #chatbox {
      flex: 1;
      overflow-y: auto;
      padding: 1.5rem 1.5rem 1rem;
      display: flex;
      flex-direction: column;
      gap: 1.4rem;
    }

    .message-wrapper {
      display: flex;
      flex-direction: column;
      max-width: 86%;
    }

    .message-wrapper.user-side {
      align-self: flex-end;
      align-items: flex-end;
    }

    .message-wrapper.bot-side {
      align-self: flex-start;
      align-items: flex-start;
    }

    .message {
      padding: 1rem 1.3rem;
      border-radius: var(--radius);
      line-height: 1.52;
      font-size: 1.02rem;
      position: relative;
      white-space: pre-wrap;
      word-wrap: break-word;
    }

    .user {
      background: var(--user-bg);
      color: #1e40af;
      border-bottom-right-radius: 0.4rem;
    }

    .bot {
      background: var(--bot-bg);
      color: #065f46;
      border: 1px solid #d1fae5;
      border-bottom-left-radius: 0.4rem;
    }

    .bot .message-content {
      line-height: 1.6;
    }

    .bot .message-content p {
      margin: 0.75em 0;
    }

    .bot .message-content strong {
      font-weight: 600;
      color: #064e3b;
    }

    .bot .message-content em {
      font-style: italic;
      color: #065f46;
    }

    .bot .message-content ul,
    .bot .message-content ol {
      margin: 0.8em 0 0.8em 1.6em;
      padding-left: 0.4em;
    }

    .bot .message-content li {
      margin-bottom: 0.45em;
    }

    .bot .message-content code {
      background: #e6fffa;
      padding: 0.18em 0.4em;
      border-radius: 4px;
      font-family: 'Consolas', 'Courier New', monospace;
      font-size: 0.93em;
    }

    .bot .message-content pre {
      background: #f0fdfa;
      padding: 1rem;
      border-radius: 0.6rem;
      overflow-x: auto;
      margin: 1em 0;
      border: 1px solid #a7f3d0;
    }

    .bot .message-content pre code {
      background: none;
      padding: 0;
    }

    .timestamp {
      font-size: 0.78rem;
      color: var(--text-mute);
      margin-top: 0.4rem;
      opacity: 0.85;
    }

    #input-area {
      padding: 1rem 1.5rem;
      background: white;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 0.8rem;
      box-shadow: 0 -1px 4px rgba(0,0,0,0.04);
    }

    #message {
      flex: 1 1 auto;
      min-width: 0;
      padding: 0.9rem 1.3rem;
      border: 1px solid var(--border);
      border-radius: 9999px;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    #message:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(59,130,246,0.15);
    }

    button {
      flex: 0 0 auto;
      padding: 0.9rem 1.4rem;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 9999px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      display: flex;
      align-items: center;
      justify-content: center;
      white-space: nowrap;
    }

    button:hover {
      background: var(--accent-dark);
      transform: translateY(-1px);
    }

    .loading {
      align-self: flex-start;
      background: #f1f5f9;
      color: var(--text-mute);
      padding: 0.8rem 1.2rem;
      border-radius: var(--radius);
      font-style: italic;
      font-size: 0.92rem;
    }

    /* ── Mobile adjustments ── */
    @media (max-width: 640px) {
      #input-area {
        padding: 0.9rem 1.2rem;
        gap: 0.7rem;
      }

      #message {
        padding: 0.85rem 1.2rem;
        font-size: 0.98rem;
      }

      button {
        padding: 0.85rem 1.3rem;
        min-width: 54px; /* prevents button from becoming too small */
      }

      #chatbox {
        padding: 1.2rem 1rem 0.8rem;
      }
    }

    /* Very narrow screens — still try to keep one line */
    @media (max-width: 360px) {
      #input-area {
        padding: 0.8rem 1rem;
        gap: 0.6rem;
      }

      button {
        padding: 0.8rem 1.1rem;
      }
    }
  </style>
</head>
<body>

<header>
  <i data-lucide="graduation-cap" style="width:28px;height:28px;"></i>
  <h1>College AI Chatbot</h1>
</header>

<div id="chatbox"></div>

<div id="input-area">
  <input id="message" type="text" placeholder="Ask anything about the college..." autofocus />
  <button onclick="sendMessage()">
    <i data-lucide="send" style="width:18px;height:18px;"></i>
  </button>
</div>

<script>
  const chatbox = document.getElementById("chatbox");
  const input = document.getElementById("message");

  function scrollToBottom() {
    chatbox.scrollTop = chatbox.scrollHeight;
  }

  function addMessage(text, isUser = false, isLoading = false) {
    const wrapper = document.createElement("div");
    wrapper.className = "message-wrapper " + (isUser ? "user-side" : "bot-side");

    let msgDiv;

    if (isLoading) {
      msgDiv = document.createElement("div");
      msgDiv.className = "loading";
      msgDiv.textContent = text || "Thinking...";
    } else if (isUser) {
      msgDiv = document.createElement("div");
      msgDiv.className = "message user";
      msgDiv.textContent = text;
    } else {
      msgDiv = document.createElement("div");
      msgDiv.className = "message bot";

      const contentDiv = document.createElement("div");
      contentDiv.className = "message-content";

      let html = marked.parse(text || "", {
        breaks: true,
        gfm: true,
        headerIds: false,
        mangle: false
      });

      contentDiv.innerHTML = html;
      msgDiv.appendChild(contentDiv);
    }

    wrapper.appendChild(msgDiv);

    if (!isLoading && !isUser) {
      const ts = document.createElement("div");
      ts.className = "timestamp";
      ts.textContent = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
      wrapper.appendChild(ts);
    }

    chatbox.appendChild(wrapper);
    scrollToBottom();
    return wrapper;
  }

  async function sendMessage() {
    const text = input.value.trim();
    if (!text) return;

    addMessage(text, true);
    const loadingWrapper = addMessage(null, false, true);

    input.value = "";
    input.disabled = true;

    try {
      const res = await fetch("/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message: text })
      });

      const data = await res.json();

      loadingWrapper.remove();

      if (res.ok) {
        addMessage(data.reply || "No response received.", false);
      } else {
        addMessage("Error: " + (data.error || "Something went wrong"), false);
      }
    } catch (err) {
      loadingWrapper.remove();
      addMessage("Network error. Please try again.", false);
      console.error(err);
    } finally {
      input.disabled = false;
      input.focus();
    }
  }

  input.addEventListener("keypress", (e) => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  lucide.createIcons();
</script>

</body>
</html>
