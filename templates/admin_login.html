<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Login</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 380px; margin: 80px auto; padding: 20px; }
        .error { color: #c62828; margin-bottom: 16px; text-align: center; }
        form { display: flex; flex-direction: column; gap: 14px; }
        input { padding: 10px; font-size: 16px; border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 12px; background: #1e88e5; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; }
        button:hover { background: #1565c0; }
    </style>
</head>
<body>

    <h2>Admin Login</h2>

    {% if error %}
        <div class="error">{{ error }}</div>
    {% endif %}

    <form method="POST" action="">
        <input type="text"     name="username" placeholder="Username" required autofocus />
        <input type="password" name="password" placeholder="Password" required />
        <button type="submit">Login</button>
    </form>

    <p style="text-align: center; margin-top: 20px;">
        <a href="/admin/register">Register a new admin account</a>
    </p>

</body>
</html>
