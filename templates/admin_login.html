<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Login</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>

  <style>
    body {
      background: linear-gradient(135deg, #f9fafb 0%, #e5e7eb 100%);
      font-size: 0.95rem;
    }

    .card {
      background: rgba(255, 255, 255, 0.92);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(229, 231, 235, 0.7);
      border-radius: 1.25rem;
      box-shadow: 0 10px 30px -8px rgba(0,0,0,0.08);
      transition: transform 0.22s ease;
    }

    .card:hover {
      transform: translateY(-2px);
    }

    .input-group {
      position: relative;
    }

    .input-group input {
      padding: 1.4rem 1.1rem 0.5rem;
      font-size: 0.96rem;
    }

    .input-group label {
      position: absolute;
      left: 1.1rem;
      top: 1rem;
      font-size: 0.96rem;
      color: #6b7280;
      pointer-events: none;
      transition: all 0.24s ease;
    }

    .input-group input:focus + label,
    .input-group input:not(:placeholder-shown) + label {
      top: 0.45rem;
      font-size: 0.76rem;
      color: #3b82f6;
      font-weight: 500;
    }

    .btn-primary {
      background: linear-gradient(to bottom right, #3b82f6, #2563eb);
      box-shadow: 0 6px 16px -4px rgba(59,130,246,0.35);
    }

    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 24px -6px rgba(59,130,246,0.45);
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .animate-fade-in-up {
      animation: fadeInUp 0.6s ease-out forwards;
    }
  </style>
</head>

<body class="min-h-screen flex items-center justify-center p-5 font-sans antialiased">

  <div class="card w-full max-w-md p-7 sm:p-8 md:p-9 animate-fade-in-up">

    <!-- Header -->
    <div class="text-center mb-7">
      <div class="inline-flex items-center justify-center w-16 h-16 bg-blue-50 text-blue-600 rounded-xl mb-5 shadow-sm">
        <i data-lucide="shield-check" class="w-9 h-9"></i>
      </div>
      <h1 class="text-2xl font-bold text-slate-800 tracking-tight">
        Admin Login
      </h1>
      <p class="mt-2 text-sm text-slate-500">
        Secure access required
      </p>
    </div>

    <!-- Error message -->
    {% if error %}
    <div class="bg-red-50 border border-red-200 text-red-700 px-5 py-3 rounded-xl mb-6 text-sm text-center font-medium">
      {{ error }}
    </div>
    {% endif %}

    <form method="POST" action="" class="space-y-6">

      <!-- Username -->
      <div class="input-group">
        <input 
          type="text" 
          id="username" 
          name="username" 
          placeholder=" " 
          required 
          autofocus 
          class="w-full bg-white/80 border border-slate-300 rounded-xl focus:border-blue-500 focus:ring-3 focus:ring-blue-100 outline-none transition-all text-slate-900 placeholder-transparent"
        />
        <label for="username">Username</label>
      </div>

      <!-- Password -->
      <div class="input-group">
        <input 
          type="password" 
          id="password" 
          name="password" 
          placeholder=" " 
          required 
          class="w-full bg-white/80 border border-slate-300 rounded-xl focus:border-blue-500 focus:ring-3 focus:ring-blue-100 outline-none transition-all text-slate-900 placeholder-transparent"
        />
        <label for="password">Password</label>
      </div>

      <!-- Submit -->
      <button 
        type="submit" 
        class="btn-primary w-full py-3.5 text-white font-medium text-base rounded-xl flex items-center justify-center gap-2.5 transition-all active:scale-[0.98]"
      >
        <i data-lucide="log-in" class="w-5 h-5"></i>
        Sign In
      </button>

    </form>

    <!-- Footer link -->
    <div class="text-center mt-6 text-sm text-slate-500">
      <p>
        Need access? 
        <a href="/admin/register" class="text-blue-600 hover:text-blue-700 font-medium underline-offset-3 hover:underline">
          Register
        </a>
      </p>
    </div>

  </div>

  <script>
    lucide.createIcons();
  </script>

</body>
</html>
