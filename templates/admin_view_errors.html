<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Error Logs</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>

</head>

<body class="bg-gray-100 text-gray-800">

<div class="flex min-h-screen">

<!-- Sidebar -->
<aside class="w-64 bg-black text-white flex flex-col sticky top-0 h-screen">

<div class="px-6 py-5 text-xl font-semibold border-b border-gray-800 flex items-center gap-2">
<i data-lucide="layout-dashboard"></i>
Admin Panel
</div>

<nav class="flex-1 p-4 space-y-2 text-sm">

<a href="/admin/dashboard" class="flex items-center gap-3 px-4 py-2 rounded-lg hover:bg-gray-800">
<i data-lucide="home"></i> Dashboard
</a>

<a href="/admin/knowledge-base" class="flex items-center gap-3 px-4 py-2 rounded-lg hover:bg-gray-800">
<i data-lucide="database"></i> Knowledge Base
</a>

<a href="/admin/ip-addresses" class="flex items-center gap-3 px-4 py-2 rounded-lg hover:bg-gray-800">
<i data-lucide="globe"></i> IP Addresses
</a>

<a href="/admin/manage-admins" class="flex items-center gap-3 px-4 py-2 rounded-lg hover:bg-gray-800">
<i data-lucide="users"></i> Manage Admins
</a>

<a href="/admin/view-errors" class="flex items-center gap-3 px-4 py-2 rounded-lg bg-gray-800">
<i data-lucide="alert-triangle"></i> Error Logs
</a>

</nav>

<div class="p-4 border-t border-gray-800">
<a href="/admin/logout" class="flex items-center justify-center gap-2 bg-gray-800 hover:bg-gray-700 py-2 rounded-lg">
<i data-lucide="log-out"></i> Logout
</a>
</div>

</aside>


<!-- Main Content -->
<div class="flex-1 flex flex-col">

<header class="bg-white shadow-sm px-6 py-4 flex items-center gap-2">

<i data-lucide="alert-circle"></i>
<h1 class="text-xl font-semibold">Error Logs</h1>

</header>


<main class="p-6">

<!-- Tabs -->
<div class="flex gap-4 mb-6">

<button onclick="showTab('app')" id="tab-app"
class="px-4 py-2 rounded-lg bg-black text-white text-sm">
App Errors
</button>

<button onclick="showTab('rag')" id="tab-rag"
class="px-4 py-2 rounded-lg bg-gray-200 text-sm">
RAG Errors
</button>

</div>


<!-- APP ERROR LOGS -->
<div id="app">

<div class="grid md:grid-cols-2 gap-6">

{% for name, content in app_logs.items() %}

<div class="bg-white rounded-xl shadow-sm p-5">

<h3 class="font-semibold mb-3 flex items-center gap-2">
<i data-lucide="file-text"></i>
{{ name }}
</h3>

<pre class="bg-gray-900 text-green-400 text-xs p-4 rounded-lg max-h-80 overflow-auto">
{{ content }}
</pre>

</div>

{% endfor %}

</div>

</div>


<!-- RAG ERROR LOGS -->
<div id="rag" class="hidden">

<div class="grid md:grid-cols-2 gap-6">

{% for name, content in rag_logs.items() %}

<div class="bg-white rounded-xl shadow-sm p-5">

<h3 class="font-semibold mb-3 flex items-center gap-2">
<i data-lucide="file-text"></i>
{{ name }}
</h3>

<pre class="bg-gray-900 text-green-400 text-xs p-4 rounded-lg max-h-80 overflow-auto">
{{ content }}
</pre>

</div>

{% endfor %}

</div>

</div>

</main>

</div>

</div>


<script>

lucide.createIcons();

function showTab(tab){

document.getElementById("app").classList.add("hidden");
document.getElementById("rag").classList.add("hidden");

document.getElementById("tab-app").classList.remove("bg-black","text-white");
document.getElementById("tab-rag").classList.remove("bg-black","text-white");

document.getElementById(tab).classList.remove("hidden");

document.getElementById("tab-"+tab).classList.add("bg-black","text-white");

}

</script>

</body>
</html>
